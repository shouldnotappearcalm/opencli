version: 1
notes: 按领域(domain) + 动作(action)路由，不按 read/write 粗分类

mappings:
  - intent: "看一下B站热榜"
    domain: content
    action: fetch_hot
    platform: bilibili
    command: "opencli bilibili hot --limit {{limit|20}}"

  - intent: "查知乎今天热点"
    domain: content
    action: fetch_hot
    platform: zhihu
    command: "opencli zhihu hot --limit {{limit|20}}"

  - intent: "搜一下YouTube上的agent教程"
    domain: content
    action: search
    platform: youtube
    command: "opencli youtube search \"{{query}}\" --limit {{limit|20}}"

  - intent: "发一条推文"
    domain: content
    action: publish
    platform: twitter
    requiresConfirm: true
    command: "opencli twitter post \"{{draft}}\""

  - intent: "看 Hacker News 热门"
    domain: community
    action: fetch_hot
    platform: hackernews
    command: "opencli hackernews top --limit {{limit|30}}"

  - intent: "看看reddit上对openclaw的讨论"
    domain: community
    action: search
    platform: reddit
    command: "opencli reddit search \"{{query}}\" --limit {{limit|20}}"

  - intent: "查V2EX热帖"
    domain: community
    action: fetch_hot
    platform: v2ex
    command: "opencli v2ex hot --limit {{limit|20}}"

  - intent: "V2EX签到"
    domain: community
    action: checkin
    platform: v2ex
    requiresConfirm: true
    command: "opencli v2ex daily"

  - intent: "看雪球热股"
    domain: finance
    action: fetch_hot
    platform: xueqiu
    command: "opencli xueqiu hot --limit {{limit|20}}"

  - intent: "查一下NVDA报价"
    domain: finance
    action: quote
    platform: yahoo
    command: "opencli yahoo quote {{symbol}}"

  - intent: "列出这个仓库的PR"
    domain: devtools
    action: list_pr
    platform: gh
    command: "opencli gh pr list --repo {{repo}} --limit {{limit|20}}"

  - intent: "看CI最近失败记录"
    domain: devtools
    action: list_runs
    platform: gh
    command: "opencli gh run list --repo {{repo}} --limit {{limit|10}}"

  - intent: "看看有哪些插件"
    domain: devtools
    action: list_plugins
    platform: local
    command: "opencli plugin list"
